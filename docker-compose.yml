services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: case_tutor
      POSTGRES_USER: case_tutor
      POSTGRES_PASSWORD: case_tutor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U case_tutor -d case_tutor"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
